[package]
name = "anchor-dls"
version = "0.1.5"
edition = "2021"
description = "Generate IDL for Anchor programs without initializing a workspace"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/anchor-idl-gen"
keywords = ["solana", "anchor", "idl", "blockchain"]
categories = ["command-line-utilities", "development-tools"]


[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"

[[bin]]
name = "anchor-dls"
path = "src/main.rs"