[package]
name = "anchor-dls"
version = "0.1.4"
edition = "2021"
description = "Generate IDL for Anchor programs without initializing a workspace"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/anchor-idl-gen"
keywords = ["solana", "anchor", "idl", "blockchain"]
categories = ["command-line-utilities", "development-tools"]


[dependencies]
anchor-syn = { version = "0.30.1", features = ["idl-build"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
syn = { version = "1.0", features = ["full", "extra-traits", "parsing"] }
clap = { version = "4.4", features = ["derive"] }

[[bin]]
name = "anchor-dls"
path = "src/main.rs"