[package]
name = "anchor-dls"
version = "0.1.0"
edition = "2021"
description = "Generate IDL for Anchor programs without initializing a workspace"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/anchor-idl-gen"
keywords = ["solana", "anchor", "idl", "blockchain"]
categories = ["command-line-utilities", "development-tools"]


[dependencies]
anchor-lang = "0.29.0"
anchor-syn = { version = "0.29.0", features = ["idl"] }
anyhow = "1.0"
clap = { version = "4.4", features = ["derive"] }
serde = "1.0"
serde_json = "1.0"
syn = { version = "2.0", features = ["full", "parsing"] }
solana-sdk = "1.17"
flate2 = "1.0"

[lib]
name = "anchor_idl_gen"
path = "src/lib.rs"

[[bin]]
name = "anchor-idl-gen"
path = "src/main.rs"